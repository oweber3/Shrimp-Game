<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Shrimp Shift · Concert Performer Harness</title>
    <link rel="icon" href="data:," />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b1020; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; }
      #performer-hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
        color: #dfe8ff; background: rgba(10, 16, 32, 0.72);
        border: 1px solid rgba(120, 160, 255, 0.25); border-radius: 8px;
        padding: 10px 12px; max-width: 460px; backdrop-filter: blur(4px);
        user-select: none;
      }
      #performer-hud .title { font-weight: 600; margin-bottom: 8px; color: #9fd0ff; }
      #performer-hud .row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
      #performer-hud button {
        font: inherit; color: #cdd8f0; background: rgba(40, 60, 110, 0.5);
        border: 1px solid rgba(120, 160, 255, 0.3); border-radius: 5px;
        padding: 3px 8px; cursor: pointer;
      }
      #performer-hud button:hover { background: rgba(60, 90, 160, 0.65); }
      #performer-hud button.on { background: #3a6bff; color: #fff; border-color: #7aa0ff; }
      #performer-hud .state { color: #8fe0b0; margin-top: 4px; }
      #performer-hud .hint { color: #6b7ba0; margin-top: 4px; }
      #performer-beat {
        position: fixed; top: 16px; right: 18px; z-index: 10;
        width: 26px; height: 26px; border-radius: 50%;
        background: #ff5a3a; box-shadow: 0 0 18px #ff5a3a; transition: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/concert/performers/harness.js"></script>
  </body>
</html>
